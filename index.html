<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PookiesFlix</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Roboto:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- PROFILE / "WHO'S WATCHING" SCREEN -->
  <section id="profile-screen" class="profile-screen">
    <div class="profile-content">
      <h1 class="profile-heading">Who's watching?</h1>
      <div class="profile-grid">
        <button class="profile-card" id="profile-select">
          <div class="profile-avatar">💕</div>
          <span class="profile-name" id="profile-name">Pookie</span>
        </button>
      </div>
    </div>
  </section>

  <!-- MAIN BROWSE APP -->
  <div id="app" class="app hidden">

    <!-- NAV BAR -->
    <header class="navbar" id="navbar">
      <div class="navbar-left">
        <div class="logo">PookiesFlix</div>
        <nav class="nav-links">
          <a href="#" class="nav-link active" data-scroll="hero">Home</a>
          <a href="#" class="nav-link" data-scroll="rows">Occasions</a>
          <a href="#" class="nav-link" data-scroll="mylist">My List</a>
        </nav>
      </div>
      <div class="navbar-right">
        <div class="search-box">
          <span class="search-icon">🔍</span>
          <input type="text" id="search-input" placeholder="Search memories..." />
        </div>
        <div class="profile-icon" id="nav-profile-icon">💕</div>
      </div>
    </header>

    <!-- HERO -->
    <section class="hero" id="hero">
      <div class="hero-backdrop" id="hero-backdrop"></div>
      <div class="hero-shade"></div>
      <div class="hero-info">
        <div class="hero-logo" id="hero-tag">FEATURED MEMORY</div>
        <h1 class="hero-title" id="hero-title">Loading...</h1>
        <p class="hero-description" id="hero-description"></p>
        <div class="hero-buttons">
          <button class="btn btn-play" id="hero-play">▶ Play</button>
          <button class="btn btn-info" id="hero-info">ℹ More Info</button>
        </div>
      </div>
    </section>

    <!-- ROWS -->
    <main class="rows" id="rows"></main>

    <footer class="footer">
      <p>Made with ❤️ by your favorite person — Happy Birthday, Pookie!</p>
    </footer>
  </div>

  <!-- DETAILS MODAL -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal" id="modal">
      <button class="modal-close" id="modal-close">✕</button>
      <div class="modal-backdrop" id="modal-backdrop"></div>
      <div class="modal-backdrop-shade"></div>
      <div class="modal-info">
        <h2 class="modal-title" id="modal-title"></h2>
        <div class="modal-buttons">
          <button class="btn btn-play" id="modal-play">▶ Play</button>
          <button class="btn btn-circle" id="modal-like" title="Add to My List">+</button>
        </div>
        <div class="modal-meta">
          <span id="modal-date"></span>
          <span id="modal-count"></span>
        </div>
        <p class="modal-description" id="modal-description"></p>
      </div>
      <div class="modal-photos">
        <h3>Photos in this memory</h3>
        <div class="photo-list" id="photo-list"></div>
      </div>
    </div>
  </div>

  <!-- FULLSCREEN SLIDESHOW VIEWER -->
  <div class="viewer-overlay" id="viewer-overlay">
    <div class="viewer-progress" id="viewer-progress"></div>
    <button class="viewer-close" id="viewer-close">✕</button>
    <button class="viewer-nav viewer-prev" id="viewer-prev">‹</button>
    <button class="viewer-nav viewer-next" id="viewer-next">›</button>
    <div class="viewer-stage" id="viewer-stage"></div>
    <div class="viewer-info">
      <div class="viewer-occasion" id="viewer-occasion"></div>
      <div class="viewer-caption" id="viewer-caption"></div>
      <button class="viewer-playpause" id="viewer-playpause">⏸</button>
    </div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
